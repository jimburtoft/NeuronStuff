# Qwen3-VL-4B Neuron Serving Configuration for SageMaker BYOC
# ============================================================
# model.py reads these options at startup.
#
# Target: inf2.8xlarge (2 NeuronCores) via SageMaker
# SDK 2.28 -- ISA kernels NOT supported on inf2.

# Model configuration
option.model_id=Qwen/Qwen3-VL-4B-Instruct
option.tp_degree=2
option.seq_len=2048
option.max_new_tokens=256

# ISA kernel flags -- ALL OFF for inf2
# inf2 does not support ISA kernels (compiler issue NCC_IBVF032)
option.qkv_kernel_enabled=false
option.attn_kernel_enabled=false
option.mlp_kernel_enabled=false
